name: Android Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14'
          validate-wrappers: false
          cache-disabled: true

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Auto-Fix Missing Android Files & Icons
        run: |
          # 1. Create root assets folder and copy image so Capacitor finds it
          mkdir -p assets
          cp public/assets/icon.png assets/icon.png || true
          
          # 2. Recreate missing strings.xml for App Name
          mkdir -p android/app/src/main/res/values
          cat <<EOF > android/app/src/main/res/values/strings.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Loki Prime X</string>
              <string name="title_activity_main">Loki Prime X</string>
          </resources>
          EOF
          
          # 3. Generate Android Native Icons
          npx @capacitor/assets generate --android

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Aggressive Cache Clean
        run: |
          rm -rf ~/.gradle/caches/
          rm -f android/gradle/wrapper/gradle-wrapper.jar

      - name: Build Android App
        run: |
          cd android
          gradle assembleDebug --no-daemon --refresh-dependencies

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
