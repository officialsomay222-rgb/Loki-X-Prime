name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Fixes Node.js 20 deprecation warning

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Check Directory Structure
      run: |
        echo "Current directory content:"
        ls -la
        if [ -d "android" ]; then
          echo "Android folder found!"
        else
          echo "ERROR: Android folder NOT found. Please push the 'android' folder to GitHub."
          exit 1
        fi

    - name: Install Web Dependencies
      run: npm install

    - name: Build Web App
      run: npm run build

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Clear Gradle Cache
      run: |
        rm -rf ~/.gradle/caches
        rm -rf ~/.gradle/wrapper

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.2
        validate-wrappers: false
        cache-disabled: true # Completely disable to avoid using corrupted cache

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Regenerate Gradle Wrapper
      working-directory: android
      run: gradle wrapper

    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew

    - name: Build Android APK
      working-directory: android
      # Using requested flags to force clean build and avoid locking issues
      run: ./gradlew assembleDebug --no-daemon --refresh-dependencies

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: loki-prime-x-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
