name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# Yahan hum naya folder aur 4GB extra RAM de rahe hain Gradle ko
env:
  GRADLE_USER_HOME: ${{ github.workspace }}/.custom-gradle-home
  GRADLE_OPTS: "-Dorg.gradle.jvmargs='-Xmx4g -XX:MaxMetaspaceSize=512m'"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Exact Gradle 8.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.2'
          cache-disabled: true
          validate-wrappers: false

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK (Maximum Safety Mode)
        working-directory: android
        # Saare safety checks ek saath lagaye hain
        run: gradle assembleDebug --no-daemon --no-parallel --max-workers=1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
