name: Build Android APK

on:
  push:
    branches: [ "main" ] # Yahan apni branch ka naam check kar lena
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Nuke Corrupt Cache and Wrapper
        run: |
          rm -rf ~/.gradle/caches/
          rm -f android/gradle/wrapper/gradle-wrapper.jar

      - name: Setup Exact Gradle 8.2 (Fresh)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.2'
          cache-disabled: true

      - name: Install Dependencies
        run: npm install

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK with Fresh Gradle 8.2
        working-directory: android
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

